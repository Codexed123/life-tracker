<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tracker | Your Personal Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<style>
    *{
        padding: 0px;
        margin: 0px;
    }
    header{
        background-color: black;
        height: 50px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        flex-wrap: nowrap;
        gap: 50px;
    }
    body{
        background: radial-gradient(circle, #000000 0%, #080808 100%);
        color: white;
        font-family: monospace;
    }
    .h_a1{
        text-decoration-line: none;
        font-family: mnospace;
        color: white;
        margin-left: 20px;
    }
    .main_nav a{
        margin-right: 20px;
        color: white;
        font-family: monospace;
        text-decoration: none;
    }
    .main_div{
        color: white;
        font-family: monospace;
        width: 100%;
        text-align: center;
        margin-top: 100px;
    }
    .main_end{
        width: 100%;
        height: 100%;
        color: white;
        margin-top: 100px;
        display: flex;
        gap: 5px;
    }
    .main_end .main_left{
        background-color: rgb(10, 10, 10);
        width: 100%;
    }
    .main_list_left{
        display: flex;
        flex-direction: row;
        gap: 50px;
        margin-top: 20px;
        justify-content: center;
        height: 100px;
    }
    .main_list_left a{
        text-decoration: none;
        color: white;
        font-family: monospace;
    }
    .features{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
    padding:100px 10%;
}

.card{
    background:#111;
    padding:30px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:#1a1a1a;
}
</style>
<body>
    <!--Start-->
    <header>
        <a href="#" class="h_a1">Life-Tracker</a>
        <nav class="main_nav">
            <a href="#">Signup</a>
            <a href="#">Login</a>
            <a href="#">Settings</a>
        </nav>
    </header>
    <div class="main_div">
        <h1>Life Tracker</h1>
        <p>Track your progress.</p>
    </div>
    <section class="features">
    <div class="card">
        <h3>Track Habits</h3>
        <p>Build consistency with daily routines.</p>
    </div>

    <div class="card">
        <h3>Manage Goals</h3>
        <p>Set and track your long-term objectives.</p>
    </div>

    <div class="card">
        <h3>Control Finances</h3>
        <p>Monitor your expenses easily.</p>
    </div>
</section>
    <!--End-->
    <footer class="main_end">
        <div class="main_left">
            <ul class="main_list_left"">
                <a href="https://youtube.com" target="_blank">
    <i class="fa-brands fa-youtube"></i>
Youtube</a>
                <a href="https://facebook.com" target="_blank">
    <i class="fa-brands fa-facebook"></i>
Facebook</a>
<a href="https://github.com">
        <i class="fa-brands fa-github"></i>
    Github</a>
    <a href="https://www.linkedin.com/in/yourusername" target="_blank">
    <i class="fa-brands fa-linkedin"></i>

            </ul>
        </div>
    </footer>
</body>
</html>
